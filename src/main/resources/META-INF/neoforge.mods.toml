[[mods]]
modId = "backpack_logistics"
version = "1.0.0"
displayName = "Create: Backpack Logistics"
authors = "Dae"
description = '''
Backpack modules bridging Create's logistics networks, Create Mobile Packages and Sophisticated Backpacks.

Adds an Auto-Unpacker upgrade that unboxes packages addressed to you straight into your backpack,
and Stock Caller upgrades that keep your backpack stocked by ordering items from a linked logistics network.
'''

