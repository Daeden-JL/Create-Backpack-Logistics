name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Build
        run: gradle build

      - name: Generate release metadata
        run: python3 scripts/generate_release_meta.py

      - name: Remove any existing release for this tag
        # Re-running this workflow for a tag (e.g. after a bad build) must not leave stale
        # assets from the previous run sitting alongside the new ones - the auto-updater
        # picks the first matching jar by name, so a stale asset can shadow the real one.
        # softprops/action-gh-release only adds/replaces the files it's given; it does not
        # remove old ones, so the existing release (if any) is deleted first for a clean slate.
        run: gh release delete "${{ github.ref_name }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: build/release/release_notes.md
          files: |
            build/libs/create_backpack_logistics-*.jar
            build/release/dependencies.json
